<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Clipper</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <h1>🎬 AI Video & Script Clipper</h1>
    
    <label>1. URL Video (YouTube):</label>
    <input type="text" id="url" placeholder="Contoh: https://youtu.be/...">
    
    <label>2. Kalimat/Ucapan yang Dicari:</label>
    <input type="text" id="keyword" placeholder="Contoh: kesalahan pertama">
    
    <button onclick="prosesPencarian()">Cari Detik Video</button>
    
    <div id="loading" style="display:none; color:blue; margin-top: 15px;">⏳ AI Gemini sedang membaca transkrip video...</div>
    <div id="hasil" style="margin-top: 20px;"></div>

    <script>
        async function prosesPencarian() {
            const url = document.getElementById('url').value;
            const keyword = document.getElementById('keyword').value;
            const loading = document.getElementById('loading');
            const hasil = document.getElementById('hasil');

            if(!url || !keyword) return alert("Harap isi URL dan Kata Kunci!");

            loading.style.display = 'block';
            hasil.innerHTML = '';

            try {
                const response = await fetch('/api/clip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, keyword })
                });
                const data = await response.json();
                loading.style.display = 'none';

                if(response.ok) {
                    // Jika sukses, tampilkan detik dan link langsung ke video
                    hasil.innerHTML = `
                        <h3 style="color:green;">✅ Momen Ditemukan!</h3>
                        <p>Mulai: <b>Detik ke-${data.start}</b></p>
                        <p>Selesai: <b>Detik ke-${data.end}</b></p>
                        <a href="${url}&t=${data.start}s" target="_blank">
                            <button style="background-color: #ff0000; color: white;">▶️ Tonton Bagian Ini</button>
                        </a>
                    `;
                } else {
                    hasil.innerHTML = `<p style="color:red;">❌ Gagal: ${data.error}</p>`;
                }
            } catch (err) {
                loading.style.display = 'none';
                hasil.innerHTML = `<p style="color:red;">❌ Terjadi kesalahan jaringan. Cek koneksi internetmu.</p>`;
            }
        }
    </script>
</body>
</html>
